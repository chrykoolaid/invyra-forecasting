name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest > pytest.log 2>&1
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c10-pytest-diagnostics
          path: pytest.log
      - name: Validate Phase 2P deployment readiness
        env:
          INVYRA_FORECASTING_ALLOWED_ORIGINS: https://app.base44.com
          INVYRA_FORECASTING_PORT: "8000"
        run: python scripts/validate_phase2p_deployment_readiness.py
      - name: Validate Phase 2Q Render blueprint
        run: python scripts/validate_phase2q_render_blueprint.py
