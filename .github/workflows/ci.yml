name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          git clone -q --branch agent/program-g7-executive-intelligence-brief https://github.com/chrykoolaid/invyra-forecasting.git repo
          cd repo
          python -m pip install -q -e ".[dev]"
          python -m pytest -x -q --tb=short
