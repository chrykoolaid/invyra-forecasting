name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q --upgrade pip
      - run: pip install -q -e ".[dev]"
      - name: H2 focused tests
        run: pytest tests/test_operational_portfolio_api.py -q
      - name: Existing suite without H2 API tests
        run: pytest --ignore=tests/test_operational_portfolio_api.py -q
