name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip --quiet
      - run: pip install -e ".[dev]" --quiet
      - id: pytest
        continue-on-error: true
        run: pytest -q --tb=short > pytest.log 2>&1
      - if: steps.pytest.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: e6-pytest-log
          path: pytest.log
      - if: steps.pytest.outcome == 'failure'
        run: cat pytest.log && exit 1
      - name: Validate Phase 2P deployment readiness
        env:
          INVYRA_FORECASTING_ALLOWED_ORIGINS: https://app.base44.com
          INVYRA_FORECASTING_PORT: "8000"
        run: python scripts/validate_phase2p_deployment_readiness.py
      - name: Validate Phase 2Q Render blueprint
        run: python scripts/validate_phase2q_render_blueprint.py
